function fmtDate(iso) {
  if (!iso) return "—";

}
function relTime(iso) {
  if (!iso) return null;
  const diff = new Date(iso) - Date.now(),abs = Math.abs(diff),past = diff < 0;
  const m = Math.floor(abs / 60000),h = Math.floor(m / 60),d = Math.floor(h / 24);
  const s = d ? `${d}d` : h ? `${h}h` : `${m}min`;
  return past ? `${s} atrás` : `em ${s}`;
}
function statusOf(r) {
  if (!r.active) return "inactive";

    <div onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}

          <p style={{ fontSize: 12.5, color: "var(--text-muted)", lineHeight: 1.5, fontStyle: "italic" }}>{r.message}</p>

        { k: "último disparo", v: fmtDate(r.last_triggered) },
        { k: "task_id", v: r.id, mono: true },
        { k: "criado", v: fmtDate(r.created_at) }].
        map(({ k, v, sub, hi, mono }) =>
        <div key={k}>

    <div onClick={(e) => e.target === e.currentTarget && onClose()} style={{ position: "fixed", inset: 0, zIndex: 100, background: "oklch(0 0 0/0.65)", backdropFilter: "blur(5px)", display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>

// TAB: LEMBRETES
// ─────────────────────────────────────────────────────────────────────────────
function TabLembretes({ showBanner, onDismissBanner, filter, setFilter }) {
  const [reminders, setReminders] = useState(() => {
    try {const s = localStorage.getItem("telia_rem3");return s ? JSON.parse(s) : SEED_REMINDERS;} catch {return SEED_REMINDERS;}
  });
  const [editTarget, setEditTarget] = useState(null);
  const [deleteId, setDeleteId] = useState(null);
  const [toast, setToast] = useState(null);

  useEffect(() => {localStorage.setItem("telia_rem3", JSON.stringify(reminders));}, [reminders]);

  const showToast = (msg) => {setToast(msg);setTimeout(() => setToast(null), 2600);};

  const counts = FILTERS.reduce((a, f) => {
    a[f.key] = f.key === "all" ? reminders.length : reminders.filter((r) => statusOf(r) === f.key).length;
    return a;
  }, {});
  const filtered = reminders.filter((r) => filter === "all" || statusOf(r) === filter);

  const handleSave = (form) => {
    if (editTarget === "new") {
      setReminders((rs) => [{ ...form, id: "task_" + String(Date.now()).slice(-6), created_at: new Date().toISOString(), last_triggered: null, cron: form.type === "recurring" ? form.cron : null }, ...rs]);
      showToast("Lembrete criado");
    } else {
      setReminders((rs) => rs.map((r) => r.id === form.id ? form : r));
      showToast("Lembrete atualizado");
    }
    setEditTarget(null);
  };

  return (
    <>
      {/* filter bar */}
      <div style={{ padding: "10px 28px", borderBottom: "1px solid var(--border)", display: "flex", gap: 4, alignItems: "center" }}>
        <Ic n="filter" size={12} color="var(--text-dim)" />
        <div style={{ width: 8 }} />
        {FILTERS.map((f) => {
          const on = filter === f.key;
          return (
            <button key={f.key} onClick={() => setFilter(f.key)} style={{
              display: "inline-flex", alignItems: "center", gap: 6,
              padding: "4px 11px", borderRadius: 6, cursor: "pointer",
              fontSize: 12.5, fontFamily: "'DM Sans',sans-serif",
              background: on ? "var(--surface2)" : "transparent",
              border: `1px solid ${on ? "var(--border2)" : "transparent"}`,
              color: on ? "var(--text)" : "var(--text-muted)",
              transition: "all 0.12s"
            }}>
              {f.label}
              <Mono style={{ fontSize: 10, background: on ? "var(--terra-dim)" : "var(--surface2)", color: on ? "var(--terra)" : "var(--text-dim)", borderRadius: 4, padding: "1px 5px" }}>{counts[f.key]}</Mono>
            </button>);

        })}
        <div style={{ marginLeft: "auto" }}>
          <button onClick={() => setEditTarget("new")} style={{ display: "inline-flex", alignItems: "center", gap: 7, background: "var(--terra)", color: "#fff", border: "none", borderRadius: 8, padding: "7px 14px", fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "'DM Sans',sans-serif" }}>
            <Ic n="plus" size={13} color="#fff" />Novo lembrete
          </button>
        </div>
      </div>

      <div style={{ flex: 1, padding: "24px 28px", overflowY: "auto" }}>
        {showBanner && <WelcomeBanner onDismiss={onDismissBanner} />}
        {filtered.length === 0 ?
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", minHeight: 200, gap: 10, color: "var(--text-dim)" }}>
            <Ic n="bell" size={36} color="var(--border2)" />
            <p style={{ fontSize: 14 }}>Nenhum lembrete neste filtro</p>
          </div> :

        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(340px,1fr))", gap: 14 }}>
            {filtered.map((r, i) =>
          <ReminderCard key={r.id} r={r}
          onEdit={setEditTarget}
          onDelete={setDeleteId}
          onToggle={(id) => setReminders((rs) => rs.map((x) => x.id === id ? { ...x, active: !x.active } : x))}
          delay={i * 0.04} />

          )}
          </div>
        }
      </div>

      {editTarget && <ReminderModal reminder={editTarget === "new" ? null : editTarget} onClose={() => setEditTarget(null)} onSave={handleSave} />}
      {deleteId && <DeleteConfirm onConfirm={() => {setReminders((rs) => rs.filter((r) => r.id !== deleteId));setDeleteId(null);showToast("Lembrete removido");}} onCancel={() => setDeleteId(null)} />}
      {toast &&
      <div style={{ position: "fixed", bottom: 24, left: "50%", transform: "translateX(-50%)", background: "var(--surface2)", border: "1px solid var(--border2)", borderRadius: 8, padding: "10px 18px", display: "flex", alignItems: "center", gap: 9, fontSize: 13, color: "var(--terra)", boxShadow: "0 8px 30px oklch(0 0 0/0.45)", animation: "slideUp 0.22s ease", zIndex: 200, whiteSpace: "nowrap" }}>
          <Ic n="check" size={14} color="var(--terra)" />{toast}
        </div>
      }
    </>);

}

          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(300px,1fr))", gap: 14 }}>
            {SEED_SESSIONS.map((s, i) =>
          <button key={s.id} onClick={() => setOpen(s.id)} style={{
            background: "var(--surface)", border: "1px solid var(--border)",
            borderRadius: 10, padding: "18px 20px",
            display: "flex", flexDirection: "column", gap: 12,
            cursor: "pointer", textAlign: "left", transition: "all 0.15s",
            animation: `fadeUp 0.3s ${i * 0.05}s ease both`,
            position: "relative", overflow: "hidden"
          }}
          onMouseEnter={(e) => {e.currentTarget.style.borderColor = "var(--border2)";e.currentTarget.style.transform = "translateY(-2px)";e.currentTarget.style.background = "var(--surface2)";}}
          onMouseLeave={(e) => {e.currentTarget.style.borderColor = "var(--border)";e.currentTarget.style.transform = "translateY(0)";e.currentTarget.style.background = "var(--surface)";}}>
            
                <div style={{ height: 2, position: "absolute", top: 0, left: 0, right: 0, background: `linear-gradient(90deg,var(--terra),transparent)`, opacity: 0.5 }} />

                {/* date + count */}
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <Mono style={{ fontSize: 10.5, color: "var(--text-dim)" }}>
                    {new Date(s.date).toLocaleDateString("pt-BR", { day: "2-digit", month: "short" })}
                    {" · "}
                    {new Date(s.date).toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" })}
                  </Mono>
                  <Mono style={{ fontSize: 10, color: "var(--text-dim)", background: "var(--surface2)", border: "1px solid var(--border)", borderRadius: 4, padding: "2px 7px" }}>
                    {s.msg_count} msgs
                  </Mono>
                </div>

                {/* preview */}
                <p style={{ fontSize: 13, color: "var(--text-muted)", lineHeight: 1.5, fontStyle: "italic" }}>
                  "{s.preview}"
                </p>

                {/* keywords */}
                <div style={{ display: "flex", flexWrap: "wrap", gap: 5 }}>
                  {s.keywords.map((k) =>
              <span key={k} style={{ fontSize: 11, padding: "2px 8px", borderRadius: 20, background: "var(--surface2)", border: "1px solid var(--border)", color: "var(--text-dim)" }}>{k}</span>
              )}
                </div>

                {/* cta */}
                <div style={{ display: "flex", alignItems: "center", gap: 5, color: "var(--terra)", marginTop: 2 }}>
                  <span style={{ fontSize: 12 }}>Ver conversa</span>
                  <Ic n="chevron" size={12} color="var(--terra)" />
                </div>
              </button>
          )}
          </div>
        </>)
      }
    </div>);

}

// ─────────────────────────────────────────────────────────────────────────────
// TAB: PERFIL
// ─────────────────────────────────────────────────────────────────────────────
function TabPerfil() {
  const [profile, setProfile] = useState(SEED_PROFILE);
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(profile);
  const [saved, setSaved] = useState(false);

  const editableFields = [
  { k: "nome", label: "Nome completo" },
  { k: "telegram_id", label: "Telegram ID" },
  { k: "cidade", label: "Cidade" },
  { k: "profissao", label: "Profissão" },
  { k: "timezone", label: "Fuso horário" },
  { k: "modelo_ia", label: "Modelo de IA" },
  { k: "idioma", label: "Idioma" }];

  const readonlyFields = [
  { k: "criado_em", label: "Conta criada" },
  { k: "ultimo_acesso", label: "Último acesso" },
  { k: "total_lembretes", label: "Total de lembretes" },
  { k: "total_mensagens", label: "Total de mensagens" }];


  const handleSave = () => {
    setProfile(draft);
    setEditing(false);
    setSaved(true);
    setTimeout(() => setSaved(false), 2600);
  };

  const fmtVal = (k, v) => {
    if (k === "criado_em" || k === "ultimo_acesso") return fmtDate(v);
    return String(v);
  };

  return (
    <div style={{ flex: 1, overflowY: "auto", padding: "28px" }}>
      <div style={{ maxWidth: 640, margin: "0 auto", display: "flex", flexDirection: "column", gap: 20 }}>

        {/* user card */}
        <div style={{ background: "var(--surface)", border: "1px solid var(--border2)", borderRadius: 12, padding: "28px 28px 24px", display: "flex", gap: 20, alignItems: "flex-start" }}>
          <div style={{ width: 64, height: 64, borderRadius: "50%", background: "var(--terra-dim)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
            <Mono style={{ fontSize: 20, fontWeight: 700, color: "var(--terra)" }}>{">/"}</Mono>
          </div>
          <div style={{ flex: 1 }}>
            <h2 style={{ fontSize: 20, fontWeight: 700, letterSpacing: "-0.01em", marginBottom: 4 }}>
              {profile.nome
                ? profile.nome
                : <span style={{ color: "var(--text-dim)", fontStyle: "italic", fontWeight: 400, fontSize: 15 }}>você não me falou seu nome 😕</span>
              }
            </h2>
            <Mono style={{ fontSize: 12, color: profile.telegram_id ? "var(--terra)" : "var(--text-dim)", display: "block", marginBottom: 8, fontStyle: profile.telegram_id ? "normal" : "italic" }}>
              {profile.telegram_id ? profile.telegram_id : "@[ você não contou seu apelido para mim 😕 ]"}
            </Mono>
            <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
              {[profile.cidade, profile.profissao, profile.modelo_ia].map((v) =>
              <span key={v} style={{ fontSize: 11.5, color: "var(--text-muted)", background: "var(--surface2)", border: "1px solid var(--border)", borderRadius: 6, padding: "3px 10px" }}>{v}</span>
              )}
            </div>
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            {!editing ?
            <button onClick={() => {setDraft(profile);setEditing(true);}} style={{ display: "inline-flex", alignItems: "center", gap: 6, background: "var(--surface2)", border: "1px solid var(--border2)", color: "var(--text-muted)", borderRadius: 8, padding: "8px 14px", fontSize: 12.5, cursor: "pointer", fontFamily: "'DM Sans',sans-serif" }}>
                <Ic n="edit" size={13} color="var(--text-muted)" />Editar
              </button> :

            <>
                <button onClick={() => setEditing(false)} style={{ display: "inline-flex", alignItems: "center", gap: 6, background: "transparent", border: "1px solid var(--border2)", color: "var(--text-muted)", borderRadius: 8, padding: "8px 14px", fontSize: 12.5, cursor: "pointer", fontFamily: "'DM Sans',sans-serif" }}>
                  Cancelar
                </button>
                <button onClick={handleSave} style={{ display: "inline-flex", alignItems: "center", gap: 6, background: "var(--terra)", border: "none", color: "#fff", borderRadius: 8, padding: "8px 14px", fontSize: 12.5, fontWeight: 600, cursor: "pointer", fontFamily: "'DM Sans',sans-serif" }}>
                  <Ic n="save" size={13} color="#fff" />Salvar
                </button>
              </>
            }
          </div>
        </div>

        {/* editable fields */}
        <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 12, overflow: "hidden" }}>
          <div style={{ padding: "14px 22px", borderBottom: "1px solid var(--border)", display: "flex", alignItems: "center", gap: 8 }}>
            <Ic n="user" size={13} color="var(--text-dim)" />
            <Mono style={{ fontSize: 10.5, letterSpacing: "0.08em", textTransform: "uppercase", color: "var(--text-dim)" }}>Informações do perfil</Mono>
          </div>
          {editableFields.map(({ k, label }, i) =>
          <div key={k} style={{
            display: "grid", gridTemplateColumns: "180px 1fr",
            padding: "12px 22px", alignItems: "center",
            borderBottom: i < editableFields.length - 1 ? "1px solid var(--border)" : "none",
            background: editing ? "transparent" : "transparent"
          }}>
              <Mono style={{ fontSize: 11, letterSpacing: "0.05em", textTransform: "uppercase", color: "var(--text-dim)" }}>{label}</Mono>
              {editing ?
            <input value={draft[k] || ""} onChange={(e) => setDraft((d) => ({ ...d, [k]: e.target.value }))}
            style={{ ...iBase, fontSize: 13, padding: "6px 10px", maxWidth: 340 }} /> :

            <span style={{ fontSize: 13.5, color: "var(--text)" }}>{profile[k]}</span>
            }
            </div>
          )}
        </div>

        {/* readonly fields */}
        <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 12, overflow: "hidden" }}>
          <div style={{ padding: "14px 22px", borderBottom: "1px solid var(--border)", display: "flex", alignItems: "center", gap: 8 }}>
            <Ic n="history" size={13} color="var(--text-dim)" />
            <Mono style={{ fontSize: 10.5, letterSpacing: "0.08em", textTransform: "uppercase", color: "var(--text-dim)" }}>Dados do sistema</Mono>
          </div>
          {readonlyFields.map(({ k, label }, i) =>
          <div key={k} style={{
            display: "grid", gridTemplateColumns: "180px 1fr",
            padding: "12px 22px", alignItems: "center",
            borderBottom: i < readonlyFields.length - 1 ? "1px solid var(--border)" : "none"
          }}>
              <Mono style={{ fontSize: 11, letterSpacing: "0.05em", textTransform: "uppercase", color: "var(--text-dim)" }}>{label}</Mono>
              <Mono style={{ fontSize: 13, color: "var(--text-muted)" }}>{fmtVal(k, profile[k])}</Mono>
            </div>
          )}
        </div>

      </div>

      {saved &&
      <div style={{ position: "fixed", bottom: 24, left: "50%", transform: "translateX(-50%)", background: "var(--surface2)", border: "1px solid var(--border2)", borderRadius: 8, padding: "10px 18px", display: "flex", alignItems: "center", gap: 9, fontSize: 13, color: "var(--terra)", boxShadow: "0 8px 30px oklch(0 0 0/0.45)", animation: "slideUp 0.22s ease", zIndex: 200, whiteSpace: "nowrap" }}>
          <Ic n="check" size={14} color="var(--terra)" />Perfil atualizado
        </div>
      }
    </div>);

}

// ─────────────────────────────────────────────────────────────────────────────
// APP
// ─────────────────────────────────────────────────────────────────────────────
const TABS = [
{ key: "lembretes", label: "Lembretes", icon: "bell" },
{ key: "historico", label: "Histórico", icon: "history" },
{ key: "perfil", label: "Perfil", icon: "user" }];


function App() {
  const [tab, setTab] = useState(() => localStorage.getItem("telia_tab") || "lembretes");
  const [filter, setFilter] = useState("all");
  const [showBanner, setShowBanner] = useState(() => localStorage.getItem("telia_banner_dismissed") !== "1");

  useEffect(() => {localStorage.setItem("telia_tab", tab);}, [tab]);

  // breadcrumb label
  const breadcrumbSub = tab === "lembretes" ?
  FILTERS.find((f) => f.key === filter)?.label :
  TABS.find((t) => t.key === tab)?.label;

  return (
    <div style={{ height: "100vh", display: "flex", flexDirection: "column" }}>

      {/* ── HEADER ── */}
      <header style={{ background: "var(--surface)", borderBottom: "1px solid var(--border)", padding: "11px 28px", display: "flex", alignItems: "center", gap: 16, flexShrink: 0 }}>
        {/* breadcrumb */}
        <div style={{ display: "flex", alignItems: "center" }}>
          <Mono style={{ fontSize: 13, color: "var(--terra)", fontWeight: 500 }}>{">"}</Mono>
          <Mono style={{ fontSize: 13, color: "var(--text-dim)", margin: "0 6px" }}>/</Mono>
          <Mono style={{ fontSize: 13, color: "var(--text-muted)" }}>TELia</Mono>
          <Mono style={{ fontSize: 13, color: "var(--text-dim)", margin: "0 6px" }}>/</Mono>
          <Mono style={{ fontSize: 13, color: "var(--text-muted)" }}>Lembretes</Mono>
          <Mono style={{ fontSize: 13, color: "var(--text-dim)", margin: "0 6px" }}>/</Mono>
          <Mono style={{ fontSize: 13, color: "var(--text)", fontWeight: 500, transition: "color 0.15s" }}>{breadcrumbSub}</Mono>
        </div>

        {/* tabs */}
        <nav style={{ display: "flex", gap: 2, marginLeft: 24 }}>
          {TABS.map((t) => {
            const on = tab === t.key;
            return (
              <button key={t.key} onClick={() => setTab(t.key)} style={{
                display: "inline-flex", alignItems: "center", gap: 7,
                padding: "6px 14px", borderRadius: 7, cursor: "pointer",
                fontSize: 13, fontFamily: "'DM Sans',sans-serif",
                background: on ? "var(--terra-dim)" : "transparent",
                border: "1px solid " + (on ? "var(--terra-mid)" : "transparent"),
                color: on ? "var(--terra)" : "var(--text-muted)",
                transition: "all 0.15s"
              }}>
                <Ic n={t.icon} size={13} color={on ? "var(--terra)" : "var(--text-dim)"} />
                {t.label}
              </button>);

          })}
        </nav>

        {/* user chip — clicks to perfil */}
        <button
          onClick={() => setTab("perfil")}
          title="Ver perfil"
          style={{
            marginLeft: "auto",
            display: "flex", alignItems: "center", gap: 9,
            background: "var(--surface2)", border: "1px solid var(--border)",
            borderRadius: 8, padding: "6px 12px", cursor: "pointer",
            transition: "border-color 0.15s"
          }}
          onMouseEnter={(e) => e.currentTarget.style.borderColor = "var(--terra-mid)"}
          onMouseLeave={(e) => e.currentTarget.style.borderColor = "var(--border)"}>
          
          <div style={{ width: 24, height: 24, borderRadius: "50%", background: "var(--terra-dim)", display: "flex", alignItems: "center", justifyContent: "center" }}>
            <Mono style={{ fontSize: 10, fontWeight: 700, color: "var(--terra)" }}>{">/"}</Mono>
          </div>
          <div style={{ textAlign: "left" }}>
            <div style={{ fontSize: 12.5, fontWeight: 500, lineHeight: 1.2, color: "var(--text)" }}>Emanuel Ziegler Martins</div>
            <Mono style={{ fontSize: 10, color: "var(--text-dim)", display: "block" }}>user_id: 0042</Mono>
          </div>
          <Ic n="chevron" size={12} color="var(--text-dim)" />
        </button>
      </header>

      {/* ── CONTENT ── */}
      <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
        {tab === "lembretes" &&
        <TabLembretes
          showBanner={showBanner}
          onDismissBanner={() => {localStorage.setItem("telia_banner_dismissed", "1");setShowBanner(false);}}
          filter={filter}
          setFilter={setFilter} />

        }
        {tab === "historico" && <TabHistorico />}
        {tab === "perfil" && <TabPerfil />}
      </div>

      <TweaksPanel currentTab={tab} setTab={setTab} />
    </div>);

}

// ─────────────────────────────────────────────────────────────────────────────
// TWEAKS
// ─────────────────────────────────────────────────────────────────────────────
const TWEAK_DEFAULS = /*EDITMODE-BEGIN*/{
  "accentColor": "#c16048",
  "cardBorder": "subtle"
} /*EDITMODE-END*/;

function TweaksPanel({ currentTab, setTab }) {
  const [vis, setVis] = useState(false);
  const [vals, setVals] = useState(TWEAK_DEFAULS);

  useEffect(() => {
    window.addEventListener("message", (e) => {
      if (e.data?.type === "__activate_edit_mode") setVis(true);
      if (e.data?.type === "__deactivate_edit_mode") setVis(false);
    });
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
  }, []);

  const set = (k, v) => {
    const next = { ...vals, [k]: v };
    setVals(next);
    window.parent.postMessage({ type: "__edit_mode_set_keys", edits: next }, "*");
    if (k === "accentColor") {
      document.documentElement.style.setProperty("--terra", v);
    }
  };

  if (!vis) return null;
  return (
    <div style={{ position: "fixed", bottom: 24, right: 24, zIndex: 300, background: "var(--surface2)", border: "1px solid var(--border2)", borderRadius: 12, padding: "16px 18px", width: 220, boxShadow: "0 12px 40px oklch(0 0 0/0.5)", animation: "scaleIn 0.2s ease" }}>
      <Mono style={{ fontSize: 10, letterSpacing: "0.08em", textTransform: "uppercase", color: "var(--text-dim)", display: "block", marginBottom: 14 }}>Tweaks</Mono>
      <div style={{ marginBottom: 14 }}>
        <div style={{ fontSize: 11, color: "var(--text-muted)", marginBottom: 8 }}>Cor de destaque</div>
        <div style={{ display: "flex", gap: 6 }}>
          {[["#c16048", "Terracota"], ["#4f7caa", "Ardósia"], ["#6a8f5e", "Salva"], ["#a07840", "Cobre"]].map(([c, label]) =>
          <div key={c} title={label} onClick={() => set("accentColor", c)} style={{ width: 22, height: 22, borderRadius: "50%", background: c, cursor: "pointer", outline: vals.accentColor === c ? `2px solid ${c}` : "none", outlineOffset: 2 }} />
          )}
        </div>
      </div>
      <div style={{ marginBottom: 14 }}>
        <div style={{ fontSize: 11, color: "var(--text-muted)", marginBottom: 8 }}>Ir para aba</div>
        <div style={{ display: "flex", gap: 6 }}>
          {TABS.map((t) =>
          <button key={t.key} onClick={() => setTab(t.key)} style={{ fontSize: 10, fontFamily: "'DM Mono',monospace", padding: "3px 7px", borderRadius: 4, cursor: "pointer", background: currentTab === t.key ? "var(--terra-dim)" : "transparent", border: "1px solid var(--border2)", color: currentTab === t.key ? "var(--terra)" : "var(--text-muted)" }}>{t.label}</button>
          )}
        </div>
      </div>
    </div>);

}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
